# CI Pipeline
#
# Runs the full Python CI pipeline on every push to main and on pull requests:
#
#   security (parallel)  — gitleaks + pip-audit + guarddog  (gates everything below)
#   lint                 — ruff check + ruff format           ┐ parallel after security
#   test                 — uv sync + pytest --cov             ┘
#   vulnerability-scan   — Syft + Grype source scan (no Docker)
#
# Docker jobs are intentionally omitted — logscope is a CLI tool, not a container.

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Security — three parallel scans, all must pass before lint/test run
  # ─────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gitleaks-scan
        with:
          fail-on-findings: "true"

  pip-audit:
    name: Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - uses: ./.github/actions/pip-audit
        with:
          working-directory: "."
          fail-on-findings: "true"

  guarddog:
    name: Supply Chain Scan (guarddog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - uses: ./.github/actions/guarddog-scan
        with:
          working-directory: "."
          fail-on-findings: "true"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Lint + Test — parallel, both need all three security jobs to pass
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: [gitleaks, pip-audit, guarddog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - name: Install dev dependencies
        run: uv sync --frozen --extra dev
      - name: Run ruff check
        shell: bash
        run: |
          set +e
          uv run ruff check . 2>&1 | tee /tmp/ruff-check.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          {
            echo "## Lint Results"
            echo ""
            echo "| Tool | Result | Details |"
            echo "|------|--------|---------|"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "| ruff check | ✅ Passed | — |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ruff check | ❌ Failed | see details below |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>ruff check output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ruff-check.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: Run ruff format check
        shell: bash
        run: |
          set +e
          uv run ruff format --check . 2>&1 | tee /tmp/ruff-format.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "| ruff format | ✅ Passed | — |" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| ruff format | ❌ Failed | see details below |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>ruff format output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ruff-format.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  test:
    name: Test
    needs: [gitleaks, pip-audit, guarddog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run tests with coverage
        shell: bash
        run: |
          set +e
          uv run pytest --cov=src/logscope --cov-fail-under=90 --cov-report=xml --cov-report=term-missing 2>&1 | tee /tmp/pytest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          PASSED=$(grep -oP '\d+ passed' /tmp/pytest-output.txt | tail -1 || echo "?")
          FAILED=$(grep -oP '\d+ failed' /tmp/pytest-output.txt | tail -1 || echo "")
          COVERAGE=$(grep -oP 'TOTAL\s+\d+\s+\d+\s+\K\d+(?=%)' /tmp/pytest-output.txt | tail -1 || echo "?")

          {
            echo "## Test Results"
            echo ""
            echo "| Tool | Result | Details |"
            echo "|------|--------|---------|"
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "| pytest | ✅ ${PASSED} | coverage: ${COVERAGE}% |" >> "$GITHUB_STEP_SUMMARY"
          else
            DETAIL="${FAILED:-unknown failure}"
            echo "| pytest | ❌ ${DETAIL} | coverage: ${COVERAGE}% |" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "<details><summary>pytest output</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -40 /tmp/pytest-output.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
            exit ${EXIT_CODE}
          fi
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Vulnerability scan — after all quality gates pass
  #    Docker scan disabled — logscope ships no Dockerfile
  # ─────────────────────────────────────────────────────────────────────────
  vulnerability-scan:
    name: Vulnerability Scan (Syft + Grype)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/scheduled-test-setup
      - uses: ./.github/actions/security-scan-code
        with:
          directory: "."
          fail-on-severity: "high"
