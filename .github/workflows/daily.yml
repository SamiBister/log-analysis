# Daily Build
#
# Runs the full CI pipeline every night at 02:00 UTC to catch newly published
# CVEs and supply-chain threats even when no code has changed.
#
# Identical pipeline to ci.yml — security → lint+test → vulnerability-scan.
# Docker jobs are intentionally omitted.

name: Daily Build

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Security — three parallel scans
  # ─────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
        with:
          fetch-depth: 0
      - uses: ./.github/actions/gitleaks-scan
        with:
          fail-on-findings: "true"

  pip-audit:
    name: Vulnerability Scan (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - uses: ./.github/actions/pip-audit
        with:
          working-directory: "."
          fail-on-findings: "true"

  guarddog:
    name: Supply Chain Scan (guarddog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - uses: ./.github/actions/guarddog-scan
        with:
          working-directory: "."
          fail-on-findings: "true"

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Lint + Test — parallel after security passes
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: [gitleaks, pip-audit, guarddog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - name: Install dev dependencies
        run: uv sync --frozen --extra dev
      - name: Run ruff check
        shell: bash
        run: |
          set +e
          uv run ruff check . 2>&1 | tee /tmp/ruff-check.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "## Ruff Lint" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "All checks passed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ruff-check.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
      - name: Run ruff format check
        shell: bash
        run: |
          set +e
          uv run ruff format --check . 2>&1 | tee /tmp/ruff-format.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "## Ruff Format" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${EXIT_CODE}" -eq 0 ]; then
            echo "All files correctly formatted." >> "$GITHUB_STEP_SUMMARY"
          else
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat /tmp/ruff-format.txt >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  test:
    name: Test
    needs: [gitleaks, pip-audit, guarddog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/setup-uv
      - name: Install dependencies
        run: uv sync --frozen --extra dev
      - name: Run tests with coverage
        shell: bash
        run: |
          set +e
          uv run pytest --cov=src/logscope --cov-fail-under=90 --cov-report=xml --cov-report=term-missing 2>&1 | tee /tmp/pytest-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 /tmp/pytest-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          exit ${EXIT_CODE}
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Vulnerability scan
  # ─────────────────────────────────────────────────────────────────────────
  vulnerability-scan:
    name: Vulnerability Scan (Syft + Grype)
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4.2.2
      - uses: ./.github/actions/scheduled-test-setup
      - uses: ./.github/actions/security-scan-code
        with:
          directory: "."
          fail-on-severity: "high"
