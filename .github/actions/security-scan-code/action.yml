name: Security Scan for codebase
description: Generate SBOM with Syft, run Grype vulnerability scan, and upload SARIF to GitHub Security
inputs:
  directory:
    description: 'The directory to scan'
    required: true
  fail-on-severity:
    description: 'Fail on vulnerabilities of this severity or higher (critical, high, medium, low, negligible)'
    required: false
    default: 'high'
runs:
  using: composite
  steps:
    - name: Generate SBOM with Syft
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: |
        syft . -o json > sbom.json
        COMPONENT_COUNT=$(python3 -c "import json; d=json.load(open('sbom.json')); print(len(d.get('artifacts', [])))" 2>/dev/null || echo "?")
        echo "COMPONENT_COUNT=${COMPONENT_COUNT}" >> "$GITHUB_ENV"

    - name: Run Grype scan (table + SARIF)
      working-directory: ${{ inputs.directory }}
      shell: bash
      run: |
        {
          echo "## Vulnerability Scan Results"
          echo ""
          echo "| Tool | Result | Details |"
          echo "|------|--------|---------|"
        } >> "$GITHUB_STEP_SUMMARY"

        # SARIF output for GitHub Security tab
        grype sbom:sbom.json --only-fixed -o sarif > grype.sarif 2>/dev/null || true

        # Table output for pass/fail decision
        set +e
        grype sbom:sbom.json --only-fixed --fail-on ${{ inputs.fail-on-severity }} 2>&1 | tee /tmp/grype-output.txt
        EXIT_CODE=${PIPESTATUS[0]}
        set -e

        if [ "${EXIT_CODE}" -eq 0 ]; then
          echo "| Grype | ✅ No fixable vulns ≥ ${{ inputs.fail-on-severity }} | ${COMPONENT_COUNT} components in SBOM |" >> "$GITHUB_STEP_SUMMARY"
        else
          echo "| Grype | ❌ Vulnerabilities found | ${COMPONENT_COUNT} components in SBOM |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Grype output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/grype-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          echo "::error::Grype found fixable vulnerabilities at or above ${{ inputs.fail-on-severity }} severity."
          exit 1
        fi

    - name: Upload Grype SARIF to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ inputs.directory }}/grype.sarif
        category: grype

    - name: Cleanup
      if: always()
      shell: bash
      working-directory: ${{ inputs.directory }}
      run: rm -f /tmp/grype-output.txt grype.sarif sbom.json
