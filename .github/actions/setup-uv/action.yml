name: "Setup uv"
description: "Install uv v0.11.3 from GitHub releases with SHA-256 verification and retry logic"

runs:
  using: "composite"
  steps:
    - name: Install uv
      shell: bash
      run: |
        URL="https://github.com/astral-sh/uv/releases/download/0.11.3/uv-x86_64-unknown-linux-gnu.tar.gz"
        CHECKSUM="c0f3236f146e55472663cfbcc9be3042a9f1092275bbe3fe2a56a6cbfd3da5ce"
        MAX_ATTEMPTS=3
        ATTEMPT=0

        until [ "${ATTEMPT}" -ge "${MAX_ATTEMPTS}" ]; do
          ATTEMPT=$((ATTEMPT + 1))
          echo "Downloading uv (attempt ${ATTEMPT}/${MAX_ATTEMPTS})..."
          if curl -sSfL --retry 3 --retry-delay 5 --retry-connrefused -o /tmp/uv.tar.gz "${URL}"; then
            break
          fi
          if [ "${ATTEMPT}" -ge "${MAX_ATTEMPTS}" ]; then
            echo "::error::Failed to download uv after ${MAX_ATTEMPTS} attempts."
            exit 1
          fi
          echo "Download failed, retrying in 10s..."
          sleep 10
        done

        echo "${CHECKSUM}  /tmp/uv.tar.gz" | sha256sum -c -
        tar -xzf /tmp/uv.tar.gz --strip-components=1 -C /usr/local/bin \
          uv-x86_64-unknown-linux-gnu/uv \
          uv-x86_64-unknown-linux-gnu/uvx
        rm /tmp/uv.tar.gz
        uv --version
