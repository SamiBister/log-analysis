version: 2

updates:
  # GitHub Actions — keeps actions/checkout and any other action SHAs current
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "github-actions"

  # Python dependencies via uv (pyproject.toml + uv.lock)
  # Dependabot does not support uv natively; pip ecosystem reads pyproject.toml
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "python"
